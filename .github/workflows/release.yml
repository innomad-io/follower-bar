name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_NAME: FollowerBar
  HOMEBREW_CASK_NAME: followerbar
  HOMEBREW_TAP_REPOSITORY: innomad-io/homebrew-tap

jobs:
  build-macos:
    name: Build macOS (${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
          - target: x86_64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri bundle
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Collect release artifacts
        id: artifacts
        shell: bash
        run: |
          set -euo pipefail
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          mapfile -t FILES < <(find "$BUNDLE_DIR" -type f \( -name '*.dmg' -o -name '*.app.tar.gz' -o -name '*.sig' \) | sort)
          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "No release artifacts found in $BUNDLE_DIR" >&2
            exit 1
          fi
          {
            echo "files<<EOF"
            printf '%s\n' "${FILES[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: FollowerBar ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ steps.artifacts.outputs.files }}

  update-homebrew-tap:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    needs: build-macos
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}

    steps:
      - name: Checkout app repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: ${{ env.HOMEBREW_TAP_REPOSITORY }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: .tap

      - name: Generate Homebrew cask
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
          TAP_DIR: .tap
          PRODUCT_NAME: ${{ env.APP_NAME }}
          HOMEBREW_CASK_NAME: ${{ env.HOMEBREW_CASK_NAME }}
        run: node scripts/update-homebrew-cask.mjs

      - name: Commit and push tap update
        shell: bash
        run: |
          set -euo pipefail
          cd .tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/${HOMEBREW_CASK_NAME}.rb
          git commit -m "Update ${HOMEBREW_CASK_NAME} to ${GITHUB_REF_NAME}" || exit 0
          git push
