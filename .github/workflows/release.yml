name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_NAME: FollowerBar
  HOMEBREW_CASK_NAME: followerbar
  HOMEBREW_TAP_REPOSITORY: innomad-io/homebrew-tap

jobs:
  build-macos:
    name: Build macOS (${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
          - target: x86_64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Decide Apple signing mode
        id: signing
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ secrets.APPLE_CERTIFICATE }}" ] && \
             [ -n "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" ] && \
             [ -n "${{ secrets.KEYCHAIN_PASSWORD }}" ] && \
             [ -n "${{ secrets.APPLE_ID }}" ] && \
             [ -n "${{ secrets.APPLE_PASSWORD }}" ] && \
             [ -n "${{ secrets.APPLE_TEAM_ID }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Tauri bundle (unsigned)
        if: steps.signing.outputs.enabled == 'false'
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Build Tauri bundle (signed/notarized)
        if: steps.signing.outputs.enabled == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Collect release artifacts
        id: artifacts
        shell: bash
        run: |
          set -euo pipefail
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"
          FILES="$(find "$BUNDLE_DIR" -type f \( -name '*.dmg' -o -name '*.app.tar.gz' -o -name '*.sig' \) | sort)"
          if [ -z "$FILES" ]; then
            echo "No release artifacts found in $BUNDLE_DIR" >&2
            exit 1
          fi
          {
            echo "files<<EOF"
            printf '%s\n' "$FILES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_FILES: ${{ steps.artifacts.outputs.files }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" $RELEASE_FILES --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$RELEASE_TAG" $RELEASE_FILES \
              --repo "$GITHUB_REPOSITORY" \
              --title "FollowerBar $RELEASE_TAG" \
              --generate-notes
          fi

  update-homebrew-tap:
    name: Update Homebrew tap
    runs-on: ubuntu-latest
    needs: build-macos
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}

    steps:
      - name: Checkout app repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Checkout Homebrew tap
        uses: actions/checkout@v5
        with:
          repository: ${{ env.HOMEBREW_TAP_REPOSITORY }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: .tap

      - name: Generate Homebrew cask
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
          TAP_DIR: .tap
          PRODUCT_NAME: ${{ env.APP_NAME }}
          HOMEBREW_CASK_NAME: ${{ env.HOMEBREW_CASK_NAME }}
        run: node scripts/update-homebrew-cask.mjs

      - name: Commit and push tap update
        shell: bash
        run: |
          set -euo pipefail
          cd .tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/${HOMEBREW_CASK_NAME}.rb
          git commit -m "Update ${HOMEBREW_CASK_NAME} to ${GITHUB_REF_NAME}" || exit 0
          git push
